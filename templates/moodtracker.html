<div class="page-wrapper">
    <h1 class="page-title">Mood Tracker</h1>
    <p class="page-subtitle">
        How are you feeling today?
    </p>

    <div class="card-grid">
       <div class="soft-card" onclick="sendMood('happy')">😊 Happy</div>
       <div class="soft-card" onclick="sendMood('calm')">😌 Calm</div>
       <div class="soft-card" onclick="sendMood('sad')">😔 Sad</div>
       <div class="soft-card" onclick="sendMood('stressed')">😫 Stressed</div>
    </div>

    <div class="section-cta">
        <a href="/dashboard"><button>Back to Dashboard</button></a>
    </div>
</div>
<script>
function sendMood(mood) {
    fetch("/save_mood", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ mood: mood })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
    });
}
</script>
